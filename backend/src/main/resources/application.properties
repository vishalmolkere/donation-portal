# ── Server ──────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:donation_portal}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
# NEVER use 'update' in production — use 'validate' + Flyway instead
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_256_BIT_RANDOM_KEY}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.donation=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:WARN}
