# ── Production overrides ───────────────────────────────────────────────────
# All secrets MUST come from environment variables (see .env.example)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# NEVER use 'update' in production — run Flyway migrations before deploy
spring.jpa.hibernate.ddl-auto=validate
logging.level.com.donation=WARN
logging.level.org.springframework.security=WARN
# Set CORS_ALLOWED_ORIGINS env var to your real frontend URL
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
